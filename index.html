<!DOCTYPE html>
<html>
<head>
<title>Student Form</title>

<style>
body{
    font-family: Arial;
    background:#f2f2f2;
}

.container{
    width:300px;
    margin:80px auto;
    background:white;
    padding:20px;
    border-radius:10px;
}

input,button{
    width:100%;
    padding:12px;
    margin:10px 0;
    box-sizing:border-box;
}

button{
    cursor:pointer;
}
</style>

</head>

<body>


<div class="container">

<h2>User Login</h2>

<form id="studentForm">

<input 
type="text" 
id="name" 
placeholder="Enter name"
required>


<input 
type="text" 
id="mobile" 
placeholder="Enter mobile"
required>


<button type="submit">
Submit
</button>

</form>

</div>



<script>

const webhookURL = "https://cloud.activepieces.com/api/v1/webhooks/A3fmDh7ifefHXjW4Xc2Qx";


document
.getElementById("studentForm")
.addEventListener("submit", async function(e){

    e.preventDefault();


    const name =
    document.getElementById("name").value;


    const mobile =
    document.getElementById("mobile").value;



    try{


        const response = await fetch(webhookURL,{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({

                name:name,
                mobile:mobile

            })

        });



        const result = await response.text();


        if(response.ok){

            alert("Form submitted successfully");

            document
            .getElementById("studentForm")
            .reset();

        }

        else{

            alert("Server error: "+result);

        }



    }

    catch(error){

        console.log(error);

        alert("Form submitting error");

    }



});


</script>


</body>
</html>
